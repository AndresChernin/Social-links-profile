<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" type="text/css" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">  
  <title>Frontend Mentor | Social links profile</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center;padding:15px 0; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main class="main-container">
    <div class="image-container">
      <img src="./assets/images/my-foto.jpg" class="image-settings" alt="">
    </div>

    <div class="info-container">
      <p class="name-settings">Andres Chernin</p>
      <p class="residence-settings">Nordrein-Westfallen, Germany</p>
    </div>

    <p class="skills-settings">"Front-end developer and Python programmer"</p>
    <section class="links-container">
      <a
      href="https://github.com/AndresChernin"
      target="_blank"
      rel="noopener noreferrer"
      >GitHub</a>
      <a
      href="https://www.frontendmentor.io/profile/AndresChernin"
      target="_blank"
      rel="noopener noreferrer"
      >Frontend Mentor</a>
      <a class="disabled-icon">LinkedIn</a>
      <a class="disabled-icon">Twitter</a>
      <a class="disabled-icon">Instagram</a>
    </section>
  </main>
<!--
  Jessica Randall
  London, United Kingdom
  "Front-end developer and avid reader."

  GitHub
  Frontend Mentor
  LinkedIn
  Twitter
  Instagram
 --> 

 
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Andres Chernin</a>.
  </footer>

</body>
</html>
